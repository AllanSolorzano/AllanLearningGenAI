services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chaos_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chaos_store"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api-gateway:
    build:
      context: ./api-gateway
    environment:
      NODE_ENV: development
      PORT: 8080
      INVENTORY_SERVICE_URL: http://inventory-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      PAYMENT_FALLBACK_ENABLED: "true"
      OTEL_SERVICE_NAME: chaos-api-gateway-local
    ports:
      - "8080:8080"
    depends_on:
      inventory-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: ./inventory-service
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chaos_store
      DB_USER: postgres
      DB_PASSWORD: postgres
      OTEL_SERVICE_NAME: chaos-inventory-service-local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./order-service
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chaos_store
      DB_USER: postgres
      DB_PASSWORD: postgres
      OTEL_SERVICE_NAME: chaos-order-service-local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./payment-service
    environment:
      NODE_ENV: development
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: chaos_store
      DB_USER: postgres
      DB_PASSWORD: postgres
      OTEL_SERVICE_NAME: chaos-payment-service-local
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:8080"
    depends_on:
      api-gateway:
        condition: service_healthy

volumes:
  postgres-data:
