apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-discovery-readonly
  namespace: chaos-app
rules:
  - apiGroups:
      - ""
      - apps
      - networking.k8s.io
      - autoscaling
      - policy
    resources:
      - pods
      - services
      - endpoints
      - configmaps
      - events
      - deployments
      - statefulsets
      - replicasets
      - ingresses
      - horizontalpodautoscalers
      - poddisruptionbudgets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: discovery-agent-readonly
  namespace: chaos-app
subjects:
  - kind: ServiceAccount
    name: discovery-agent-sa
    namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-discovery-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-planner-readonly
  namespace: chaos-app
subjects:
  - kind: ServiceAccount
    name: chaos-planner-sa
    namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-discovery-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-observer-readonly
  namespace: chaos-app
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: observer-agent-readonly
  namespace: chaos-app
subjects:
  - kind: ServiceAccount
    name: observer-agent-sa
    namespace: ai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: app-observer-readonly
