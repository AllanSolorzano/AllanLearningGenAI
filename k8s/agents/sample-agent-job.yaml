apiVersion: batch/v1
kind: Job
metadata:
  name: discovery-agent-sample
  namespace: ai-agents
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: discovery-agent-sample
    spec:
      serviceAccountName: discovery-agent-sa
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kubectl
          image: bitnami/kubectl:1.32
          command:
            - /bin/sh
            - -c
            - kubectl get deploy,po,svc,ingress,hpa -n chaos-app
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
