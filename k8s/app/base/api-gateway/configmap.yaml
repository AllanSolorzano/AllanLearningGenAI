apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  NODE_ENV: "production"
  PORT: "8080"
  INVENTORY_SERVICE_URL: "http://inventory-service:8080"
  ORDER_SERVICE_URL: "http://order-service:8080"
  PAYMENT_SERVICE_URL: "http://payment-service:8080"
  INVENTORY_SERVICE_TIMEOUT_MS: "3000"
  ORDER_SERVICE_TIMEOUT_MS: "3000"
  PAYMENT_SERVICE_TIMEOUT_MS: "3000"
  PAYMENT_FALLBACK_ENABLED: "true"
  OTEL_SERVICE_NAME: "chaos-api-gateway"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ai-chaos-gameday,deployment.environment=dev"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
