apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: chaos-db-secret
  namespace: chaos-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: chaos-db-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /chaos-app/postgres
