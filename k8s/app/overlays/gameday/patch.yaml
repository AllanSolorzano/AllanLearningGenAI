apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
data:
  PAYMENT_FALLBACK_ENABLED: "false"
  ORDER_SERVICE_TIMEOUT_MS: "15000"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ai-chaos-gameday,deployment.environment=gameday"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
data:
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ai-chaos-gameday,deployment.environment=gameday"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-service-config
data:
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ai-chaos-gameday,deployment.environment=gameday"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-service-config
data:
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=ai-chaos-gameday,deployment.environment=gameday"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
spec:
  template:
    spec:
      containers:
        - name: inventory-service
          resources:
            requests:
              cpu: 5m
              memory: 192Mi
            limits:
              cpu: 750m
              memory: 512Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-service
spec:
  minAvailable: 0
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service
spec:
  minReplicas: 1
  maxReplicas: 2
