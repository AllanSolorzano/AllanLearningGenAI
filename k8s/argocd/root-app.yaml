apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-chaos-gameday-root
  namespace: argocd
spec:
  project: default
  source:
    # TODO: Replace with your Git repository URL after publishing this repo.
    repoURL: https://github.com/REPLACE_ME/ai-chaos-gameday-platform.git
    targetRevision: HEAD
    path: k8s/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
