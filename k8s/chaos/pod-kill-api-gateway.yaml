# WARNING: This intentionally kills one api-gateway pod in chaos-app. Run only during an approved Arena exercise.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: api-gateway-pod-kill
  namespace: chaos-app
spec:
  action: pod-kill
  mode: one
  duration: "30s"
  selector:
    namespaces:
      - chaos-app
    labelSelectors:
      app.kubernetes.io/name: api-gateway
