# WARNING: This intentionally kills one inventory-service pod in chaos-app. Run only during an approved GameDay.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: inventory-service-pod-kill
  namespace: chaos-app
spec:
  action: pod-kill
  mode: one
  duration: "30s"
  selector:
    namespaces:
      - chaos-app
    labelSelectors:
      app.kubernetes.io/name: inventory-service
