apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-experiment-runner
  namespace: chaos-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-experiment-runner
  namespace: chaos-app
rules:
  - apiGroups:
      - chaos-mesh.org
    resources:
      - podchaos
      - networkchaos
      - stresschaos
    verbs:
      - get
      - list
      - watch
      - create
      - delete
  - apiGroups:
      - ""
    resources:
      - pods
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-experiment-runner
  namespace: chaos-app
subjects:
  - kind: ServiceAccount
    name: chaos-experiment-runner
    namespace: chaos-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chaos-experiment-runner
